<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===========================
         Header
    ============================ -->

    <header>
        <h1>📋 Task Tracker</h1>
        <p>Manage your daily tasks efficiently.</p>
    </header>

    <!-- ===========================
         Main Content
    ============================ -->

    <main>

        <!-- Task Form -->

        <section class="task-form">

            <h2>Add New Task</h2>

            <form id="task-form">

                <div class="form-group">
                    <label for="task-name">Task Name</label>

                    <input
                        type="text"
                        id="task-name"
                        placeholder="Enter task"
                        required>
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>

                    <select id="priority" required>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="due-date">Due Date</label>

                    <input
                        type="date"
                        id="due-date"
                        required>
                </div>

                <button type="submit">
                    Add Task
                </button>

            </form>

        </section>

        <!-- Filters -->

        <section class="filters">

            <h2>Filters</h2>

            <button id="filter-all">
                All
            </button>

            <button id="filter-pending">
                Pending
            </button>

            <button id="filter-done">
                Done
            </button>

            <label for="sort-tasks">
                Sort By
            </label>

            <select id="sort-tasks">
                <option value="priority">
                    By Priority
                </option>

                <option value="dueDate">
                    By Due Date
                </option>
            </select>

        </section>

        <!-- Counter -->

        <section>

            <p id="task-counter">
                Showing 0 of 0 tasks
            </p>

        </section>

        <!-- Task List -->

        <section>

            <h2>Your Tasks</h2>

            <ul id="task-list">

                <!-- JavaScript will render tasks here -->

            </ul>

            <button id="clear-all">
                Clear All
            </button>

        </section>

        <!-- Summary Table -->

        <section>

            <h2>Task Summary</h2>

            <table>

                <thead>

                    <tr>

                        <th>Task</th>

                        <th>Priority</th>

                        <th>Due Date</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="summary-body">

                    <!-- Generated by JavaScript -->

                </tbody>

            </table>

        </section>

        <!-- Priority Summary -->

        <section>

            <h2>Priority Summary</h2>

            <table>

                <thead>

                    <tr>

                        <th>Priority</th>

                        <th>Count</th>

                    </tr>

                </thead>

                <tbody id="priority-summary">

                    <!-- Generated using groupBy() -->

                </tbody>

            </table>

        </section>

    </main>

    <!-- ===========================
         Footer
    ============================ -->

    <footer>

        <p>
            © 2026 Task Tracker |
            Built using HTML, CSS, JavaScript & TypeScript
        </p>

    </footer>

    <script src="main.js"></script>

</body>

</html>
